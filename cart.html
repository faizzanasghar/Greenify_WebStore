<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Greenify</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <img src="images/THE_PLANT_HUB_updated_logo_processed.jpg" alt="Greenify Logo">
      <h1>Greenify</h1>
    </div>
    <div class="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>
    <ul class="navbar-nav">
      <li class="search-container">
        <input type="text" class="search-input" placeholder="Search plants...">
      </li>
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="about.html">About Us</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="login-page/login.html">Login</a></li>
      <li>
        <button class="theme-toggle" onclick="toggleDarkMode()">
          <i class="fas fa-moon"></i>
        </button>
      </li>
    </ul>
  </nav>

  <!-- Cart Section -->
  <section class="section">
    <div class="container">
      <h2 style="text-align: center; margin-bottom: 30px;">Your Cart</h2>
      <div id="cart-content"
        style="text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: var(--shadow-md);">
        <p id="add" style="font-size: 1.2rem; color: var(--text-light);">No items in your cart.</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 Greenify. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="javascript/script.js"></script>
  <script>
    const totalPrice = localStorage.getItem('totalPrice');
    if (totalPrice && totalPrice > 0) {
      document.getElementById("add").innerHTML = `
        <div style="margin-bottom: 20px;">
          <p style="font-size: 1.5rem; margin-bottom: 20px;">Total: <strong>$${totalPrice}</strong></p>
          <p>Would you like to proceed to checkout?</p>
        </div>
        <button class="btn" onclick="buy()">Buy Now</button>
      `;
    } else {
      document.getElementById("add").innerHTML = `
        <p>Your cart is empty.</p>
        <button class="btn" onclick="window.location.href='products.html'" style="margin-top: 20px;">Start Shopping</button>
      `;
    }
  </script>

</body>

</html>
