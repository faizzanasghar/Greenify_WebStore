<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climbers - Greenify</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <img src="../images/THE_PLANT_HUB_updated_logo_processed.jpg" alt="Greenify Logo">
      <h1>Greenify</h1>
    </div>
    <div class="menu-toggle">
      <i class="fas fa-bars"></i>
    </div>
    <ul class="navbar-nav">
      <li class="search-container">
        <input type="text" class="search-input" placeholder="Search plants...">
      </li>
      <li><a href="../index.html">Home</a></li>
      <li><a href="../products.html">Products</a></li>
      <li><a href="../about.html">About Us</a></li>
      <li><a href="../contact.html">Contact</a></li>
      <li><a href="../cart.html">Cart</a></li>
      <li><a href="../login-page/login.html">Login</a></li>
      <li>
        <button class="theme-toggle" onclick="toggleDarkMode()">
          <i class="fas fa-moon"></i>
        </button>
      </li>
    </ul>
  </nav>

  <section class="section">
    <div class="container">
      <div class="products-header">
        <h2>Climbers</h2>
      </div>

      <div class="product-grid">
        <div class="product-card">
          <img src="../images/climber-plants/bougainvilleas-plant.jpg" alt="Bougainvilleas Plant">
          <div class="product-info">
            <h3>Bougainvilleas Plant</h3>
            <p>$20</p>
            <button onclick="a(20 , this)">Add to Cart</button>
          </div>
        </div>
        <div class="product-card">
          <img src="../images/climber-plants/rock-trumpet-plant.jpg" alt="Rock Trumpet Plant">
          <div class="product-info">
            <h3>Rock Trumpet Plant</h3>
            <p>$35</p>
            <button onclick="a(35 , this)">Add to Cart</button>
          </div>
        </div>
        <div class="product-card">
          <img src="../images/climber-plants/climbimg-hydrangea-plant.jpg" alt="Climbing Hydrangea Plant">
          <div class="product-info">
            <h3>Climbing Hydrangea Plant</h3>
            <p>$15</p>
            <button onclick="a(15 , this)">Add to Cart</button>
          </div>
        </div>
        <div class="product-card">
          <img src="../images/climber-plants/star-jasmine-plant.jpg" alt="Star Jasmine Plant">
          <div class="product-info">
            <h3>Star Jasmine Plant</h3>
            <p>$20</p>
            <button onclick="a(20 , this)">Add to Cart</button>
          </div>
        </div>
        <div class="product-card">
          <img src="../images/climber-plants/wisteria-plant.jpg" alt="Wisteria Plant">
          <div class="product-info">
            <h3>Wisteria Plant</h3>
            <p>$35</p>
            <button onclick="a(35 , this)">Add to Cart</button>
          </div>
        </div>
        <div class="product-card">
          <img src="../images/climber-plants/clematis-plant.jpg" alt="Clematis Plant">
          <div class="product-info">
            <h3>Clematis Plant</h3>
            <p>$15</p>
            <button onclick="a(15 , this)">Add to Cart</button>
          </div>
        </div>
      </div>

      <div style="text-align: center; margin-top: 40px;">
        <button class="btn" onclick="totalalert()" style="margin-right: 10px;">Done Purchasing</button>
        <button class="btn" onclick="cart()">Go to Cart <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 Greenify. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="../javascript/script.js"></script>
</body>

</html>
